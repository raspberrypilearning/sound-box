<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Sound Button</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }

    button {
      font-size: 1rem;
      padding: 0.9rem 1.4rem;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sound Button</h1>
    <button id="playButton">Click me</button>
    <audio id="clickSound" src="owl.mp3" preload="auto"></audio>
  </div>

  <script>
    const playButton = document.getElementById('playButton');
    const clickSound = document.getElementById('clickSound');

    playButton.addEventListener('click', () => {
      clickSound.currentTime = 0;
      clickSound.play();
    });
  </script>
</body>
</html>
